  <text x="90" y="550" font-family="Consolas, monospace" font-size="10" fill="#888">계산된 해시: e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855</text>
  <text x="90" y="566" font-family="Consolas, monospace" font-size="10" fill="#888">입력된 해시: e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855</text>
