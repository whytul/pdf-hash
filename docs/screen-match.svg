  <circle cx="339" cy="203" r="6" fill="none" stroke="#666" stroke-width="2"/>
  <text x="353" y="208" font-family="Segoe UI, sans-serif" font-size="13" fill="#ccc">MD5</text>

  <rect x="401" y="186" width="75" height="34" rx="8" fill="#0f3460"/>
  <circle cx="419" cy="203" r="6" fill="none" stroke="#666" stroke-width="2"/>
  <text x="433" y="208" font-family="Segoe UI, sans-serif" font-size="13" fill="#ccc">SHA-1</text>

